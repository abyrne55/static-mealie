version: 2

builds:
  - id: static-mealie
    main: .
    binary: static-mealie
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0

archives:
  - formats:
      - tar.gz

checksum:
  name_template: 'checksums.txt'
